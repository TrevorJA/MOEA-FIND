# Wrapper-mode ablation, residual arm.
#
# Same as primary.yaml; included so the wrapper-mode ablation (SI-F)
# pairs explicit residual/index YAML files for symmetric comparison.
mode: residual
n_years: 20
ssi: 3
metric_set: primary

constraint_mode: dv_uniform
statistic: ad
dv_uniformity_json: outputs/02_calibration/dv_uniformity_calibration/residual/calibrated_dv_tolerances.json

algorithm: borg_mm
nfe: 200000
seed: 42
n_islands: 4
checkpoint_freq: 1000

site_label: cannonsville
