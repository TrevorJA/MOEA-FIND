# T=10 first-SSI3-drought run, fixed-anti-ideal 5-objective set
# (2026-05-14 user-specified). Runs ALONGSIDE first_event_ssi3_t10.yaml
# (back-compat preserved); does not replace it.
#
# Objectives (preset: first_event_ssi3_t10_fixed) — first critical SSI-3
# drought of each 10-year sequence only, NO duration axis:
#   first_event_severity_fc                      D*=6.75  eps=0.1
#   first_event_magnitude_fc                     D*=120   eps=1
#   first_event_peak_month_fc                    D*=13    eps=1
#   first_event_onset_intensification_rate_fc    D*=6.75  eps=0.1
#   first_event_rising_limb_fraction_fc          D*=1.1   eps=0.1
# severity/magnitude/onset = user tight targets (4.5/80/4.5) x 1.5
# DD-11 headroom so search exceeding the target can't break the identity.
#
# All five use AntiIdealRule.CONSTANT, so D* is the fixed value above
# (NOT historical-headroom or cyclic-headroom anchored). The Manhattan-norm
# DD-11 device adds the L1 distance from D* as the (K+1)th objective.
#
# Hard constraint: >=1 critical SSI-3 event in the candidate sequence
# (auto-gated by the first_event_ name prefix). Empty-event candidates
# are infeasible. DV-uniformity Anderson-Darling constraint as production.
mode: residual
n_years: 10
ssi: 3
metric_set: first_event_ssi3_t10_fixed

constraint_mode: dv_uniform
statistic: ad
dv_uniformity_json: outputs/02_calibration/dv_uniformity_calibration/residual/calibrated_dv_tolerances.json

algorithm: borg_mm
nfe: 200000
seed: 42
n_islands: 4
checkpoint_freq: 1000

site_label: cannonsville
