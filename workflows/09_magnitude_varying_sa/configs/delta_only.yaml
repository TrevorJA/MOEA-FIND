# Stage 09 -- Delta-only MPI production preset.
#
# Delta moment-independent only. Other methods are kept available in
# the engine but disabled here while the methodology is still being
# finalised. Bootstrap reduced to 50 replicates for fast iteration;
# raise once the headline figure is locked.
#
# Loaded by `run_mv_sa.py --config delta_only.yaml`. Any flag passed
# explicitly on the command line overrides the value here.
methods:
  - delta

magnitude_axis: nyc_min_storage_frac
response_form: exceedance

# 19 evenly-spaced points avoiding the degenerate 0% and 100%
# endpoints. Each MPI rank handles len(percentiles) / size of these
# (round-robin); 19 ranks give one percentile per rank.
percentiles:
  - 0.05
  - 0.10
  - 0.15
  - 0.20
  - 0.25
  - 0.30
  - 0.35
  - 0.40
  - 0.45
  - 0.50
  - 0.55
  - 0.60
  - 0.65
  - 0.70
  - 0.75
  - 0.80
  - 0.85
  - 0.90
  - 0.95

n_bootstrap: 25
# Full aligned sample. SALib delta is O(N^2) per Plischke resample, so
# at N=3308 each call is ~1.3 s with num_resamples=25 (vs ~0.05 s at
# N=500). Per-rank wall ~ 52 calls * 1.3 s ~ 70 s -- fits comfortably
# inside the 30-min SLURM budget. Lower this to 500 when iterating.
subsample_n: 0
seed: 42
cv_drop_threshold: 0.05
include_control: true

# Conditional-mode parameters (unused at response_form: exceedance).
secondary: null
window_frac: 0.30

# SALib delta-method internal Plischke resamples. 25 is sufficient for
# fast iteration on a fixed-N sample; raise to 100+ once the headline
# figure is locked.
delta_num_resamples: 25
