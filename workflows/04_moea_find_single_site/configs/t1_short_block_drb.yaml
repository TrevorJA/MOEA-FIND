# T=1 short-block event-discovery run for DRB Cannonsville (DD-15).
#
# Objectives: djf_total_neg | summer_recession | aug_zscore | ond_total_neg
# All are raw-flow Tier H/J metrics — no SSI fitting at evaluation time.
# Constraint: DV-uniformity (Anderson-Darling, n_dvs=12). Re-calibrate first:
#   sbatch workflows/02_calibration/slurm/dv_uniformity_T1.slurm
mode: residual
n_years: 1
metric_set: short_block_drb

constraint_mode: dv_uniform
statistic: ad
dv_uniformity_json: outputs/02_calibration/dv_uniformity_calibration/residual/calibrated_dv_tolerances.json

algorithm: borg_mm
nfe: 200000
seed: 42
n_islands: 4
checkpoint_freq: 1000

site_label: cannonsville
