# Stage 09 -- Delta + within-trace-percentile response (production headline).
#
# Hadjimichael Variant 2 (magnitude-of-shortage) ported to MOEA-FIND:
# Y_i(tau) = the tau-th percentile of trace i's own annual NYC min
# storage series (T=20 calendar years). No binary indicator, no
# fabricated inner ensemble -- the trace's own temporal sampling plays
# the role of the SOW's stochastic realizations in the original paper.
#
# Loaded by `run_mv_sa.py --config delta_within_trace.yaml`. Any flag
# passed explicitly on the command line overrides the value here.
methods:
  - delta

magnitude_axis: nyc_min_storage_frac
response_form: within_trace_percentile
trace_series: outputs/09_magnitude_varying_sa/precompute_trace_series/residual_T20_nfe200000_s42_constrained_cmdv_uniform_stad/annual_nyc_min_storage_frac.parquet

# 19 evenly-spaced points avoiding the degenerate 0% and 100% endpoints.
# At low tau (e.g. 0.05) Y_i is approximately the WORST year of trace i;
# at high tau (e.g. 0.95) it is approximately the BEST year.
percentiles:
  - 0.05
  - 0.10
  - 0.15
  - 0.20
  - 0.25
  - 0.30
  - 0.35
  - 0.40
  - 0.45
  - 0.50
  - 0.55
  - 0.60
  - 0.65
  - 0.70
  - 0.75
  - 0.80
  - 0.85
  - 0.90
  - 0.95

# Full archive (no subsample). At N=3308 with continuous Y the SA is
# well-conditioned; per-rank wall ~3-4 minutes.
subsample_n: 0
n_bootstrap: 50
seed: 42
cv_drop_threshold: 0.05
include_control: true

delta_num_resamples: 25
