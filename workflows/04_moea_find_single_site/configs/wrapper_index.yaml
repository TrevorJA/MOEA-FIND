# Wrapper-mode ablation, index arm (SI-F).
#
# Index DVs instead of residual; constraint and metrics are otherwise
# identical to primary so the comparison isolates the wrapper choice.
mode: index
n_years: 20
ssi: 3
metric_set: primary

constraint_mode: dv_uniform
statistic: ad
dv_uniformity_json: outputs/diag_dv_uniformity_calibration/calibrated_dv_tolerances.json

algorithm: borg_mm
nfe: 200000
seed: 42
n_islands: 4
checkpoint_freq: 1000

site_label: cannonsville
